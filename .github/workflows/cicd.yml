name: DevOps CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Build Docker Image
      run: docker build -t devops-lab-app ./app
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yml || echo "Mocking K8s deployment for lab..."
        kubectl apply -f k8s/service.yml || echo "Mocking K8s service for lab..."